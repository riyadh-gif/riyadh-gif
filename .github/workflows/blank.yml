name: Generate Tetris
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
jobs:
  tetris:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: riyadh-gif
          outputs: |
            dist/github-contribution-grid-tetris.svg?color_snake=00ff88&color_dots[]=0d1117&color_dots[]=0e4429&color_dots[]=006d32&color_dots[]=26a641&color_dots[]=39d353
            dist/github-contribution-grid-tetris-dark.svg?palette=github-dark&color_snake=00ff88
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
